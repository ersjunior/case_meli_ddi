x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/airflow/Dockerfile
  image: ml-case-airflow:2.8.1
  env_file:
    - ../.env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    # URI do hook Postgres (sem +psycopg2). Sobrescreve .env — Airflow falha com "Unknown hook type postgresql+psycopg2".
    AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://airflow:airflow@postgres:5432/airflow
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_POSTGRES_HOST: postgres
    DBT_POSTGRES_USER: airflow
    DBT_POSTGRES_PASSWORD: airflow
    DBT_POSTGRES_PORT: "5432"
    DBT_POSTGRES_DB: airflow
    DBT_POSTGRES_SCHEMA: analytics
    PIPELINE_POSTGRES_URL: postgresql://airflow:airflow@postgres:5432/airflow
  volumes: &airflow-common-volumes
    - ../orchestration/airflow/dags:/opt/airflow/dags
    - ../orchestration/airflow/logs:/opt/airflow/logs
    - ../orchestration/airflow/plugins:/opt/airflow/plugins
    - ../transformation/dbt_projects:/opt/airflow/dbt
    - ../data/raw:/opt/airflow/dags/data:ro

services:

  postgres:
    image: postgres:13
    container_name: ml-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host: evita conflito com Postgres local na 5432 (dentro da rede Docker continua 5432).
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Carga inicial (CSV + dbt) sem depender do Airflow — Streamlit só sobe depois.
  warehouse-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    image: ml-case-airflow:2.8.1
    container_name: ml-warehouse-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PIPELINE_POSTGRES_URL: postgresql://airflow:airflow@postgres:5432/airflow
      DBT_PROFILES_DIR: /dbt
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_USER: airflow
      DBT_POSTGRES_PASSWORD: airflow
      DBT_POSTGRES_PORT: "5432"
      DBT_POSTGRES_DB: airflow
      DBT_POSTGRES_SCHEMA: analytics
    volumes:
      - ../data/raw:/data:ro
      - ../transformation/dbt_projects:/dbt
      - ../docker/scripts/bootstrap_warehouse.sh:/bootstrap_warehouse.sh:ro
      - ../docker/sql/bootstrap_ddl.sql:/bootstrap_ddl.sql:ro
    # Windows costuma gravar .sh com CRLF; sed normaliza para LF em /tmp (não altera o bind-mount).
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "sed 's/\\r$$//' /bootstrap_warehouse.sh > /tmp/bootstrap_wh.sh && exec bash /tmp/bootstrap_wh.sh"

  airflow-init:
    <<: *airflow-common
    container_name: ml-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && (airflow users create \
          --username admin \
          --password admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@email.com \
          || true)
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: ml-airflow-webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: ml-airflow-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler

  streamlit:
    build:
      context: ..
      dockerfile: docker/streamlit/Dockerfile
    image: ml-case-streamlit:latest
    container_name: ml-streamlit
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      DBT_POSTGRES_SCHEMA: analytics
      PG_SEARCH_PATH: analytics,public
    ports:
      - "8501:8501"

volumes:
  postgres_data:
